name: Update stock list

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US dataset
        run: python src/build_stock_list.py --universe us --workers 1 --sleep-s 1.0

      - name: Build global dataset (optional)
        run: |
          if [ -f inputs/global_tickers.txt ] && grep -qve '^[[:space:]]*#' -e '^[[:space:]]*$' inputs/global_tickers.txt; then
            python src/build_stock_list.py --universe global --global-source file --workers 1 --sleep-s 1.0
          else
            echo "Skipping global build (inputs/global_tickers.txt empty/missing)"
          fi

      - name: Commit updated datasets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data inputs/global_tickers.txt
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: weekly update datasets"
          git push
